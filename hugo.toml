baseURL = "https://R1kaa.github.io/"
languageCode = "zh-cn"
title = "Rika's Tech Blog"
theme = "PaperMod"
enableRobotsTXT = true

[params]
  author = "Rika"
  description = "游戏开发 / AI / RL 学习笔记"
  keywords = ["游戏开发", "人工智能", "强化学习", "Unity", "Python"]
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  disableSpecial1stPost = true
  mainSections = ["posts", "projects", "works"]

  [params.label]
    text = "Rika"

  [params.homeInfoParams]
    Title = "Rika's Tech Blog"
    Content = "双线更新：创作（MAD / VOCALOID）与学术（GitHub / 项目）\n\n- 创作：MAD /works/mad/ ｜ VOCALOID /works/vocaloid/ ｜ B站主页\n- 学术：项目页 /projects/ ｜ GitHub 主页"

  [params.profileMode]
    enabled = true
    title = "Rika"
    subtitle = "创作（MAD / VOCALOID） · 学术（GitHub / 项目）"
    imageUrl = "images/avatar.jpg"
    imageTitle = "avatar"
    imageWidth = 140
    imageHeight = 140

  [[params.profileMode.buttons]]
    name = "Bilibili"
    url = "https://space.bilibili.com/518845311"

  [[params.profileMode.buttons]]
    name = "GitHub"
    url = "https://github.com/R1kaa"
  
[[params.socialIcons]]
  name = "github"
  url = "https://github.com/R1kaa"

