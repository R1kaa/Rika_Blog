baseURL = "https://R1kaa.github.io/"
languageCode = "zh-cn"
title = "Rika's Tech Blog"
theme = "PaperMod"
enableRobotsTXT = true

[params]
  author = "Rika"
  description = "创作与学术的双线记录"
  keywords = ["MAD", "VOCALOID", "项目", "技术写作", "研究记录"]
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowToc = false
  TocOpen = false
  disableSpecial1stPost = true
  mainSections = ["posts", "projects", "works"]

  [params.label]
    text = "Rika"

  [params.homeInfoParams]
    Title = "保持创作，也保持思考。"
    Content = "这里记录两条并行的线索：\n\n创作：MAD、VOCALOID、视频表达与灵感归档。\n学术：项目、技术、研究与长期学习笔记。"

  [params.profileMode]
    enabled = false
    title = "Rika"
    subtitle = "创作（MAD / VOCALOID） · 学术（GitHub / 项目）"
    imageUrl = "images/avatar.jpg"
    imageTitle = "avatar"
    imageWidth = 140
    imageHeight = 140

  [[params.profileMode.buttons]]
    name = "Bilibili"
    url = "https://space.bilibili.com/518845311"

  [[params.profileMode.buttons]]
    name = "GitHub"
    url = "https://github.com/R1kaa"
  
[[params.socialIcons]]
  name = "github"
  url = "https://github.com/R1kaa"

