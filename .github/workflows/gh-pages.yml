name: Deploy Blog

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Install PaperMod theme
        run: |
          git clone https://github.com/adityatelange/hugo-PaperMod themes/PaperMod --depth=1

      - name: Compute baseURL
        id: vars
        shell: bash
        run: |
          REPO="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY%%/*}"
          if [[ "$REPO" == "$OWNER.github.io" ]]; then
            echo "base_url=https://${OWNER}.github.io/" >> "$GITHUB_OUTPUT"
          else
            echo "base_url=https://${OWNER}.github.io/${REPO}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: |
          pwd
          ls -la
          hugo --minify --baseURL "${{ steps.vars.outputs.base_url }}"
          ls -la public/

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
