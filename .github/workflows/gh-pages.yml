name: Deploy Blog

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Install PaperMod theme
        run: |
          git clone https://github.com/adityatelange/hugo-PaperMod themes/PaperMod --depth=1

      - name: Build
        run: |
          pwd
          ls -la
          hugo --minify
          ls -la public/

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          publish_dir: ./public
